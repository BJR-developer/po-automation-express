<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Error Encountered</title>
  <link rel="stylesheet" href="/style.css" />
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <section class="hero">
    <div class="container" style="max-width: 500px;">
      <div class="glass-card" style="border-color: rgba(239, 68, 68, 0.3);">
        <div class="icon-circle" style="background: rgba(239, 68, 68, 0.1); color: var(--error); border-color: rgba(239, 68, 68, 0.2);">
          <i data-lucide="alert-circle" style="width: 40px; height: 40px;"></i>
        </div>
        
        <h1 style="font-size: 1.75rem; margin-bottom: 1rem; color: #fff;">{{ title }}</h1>
        <p style="color: var(--text-secondary); margin-bottom: 2rem;">{{ message }}</p>
        
        <a href="/" class="btn" style="background: rgba(255,255,255,0.05); color: #fff; border: 1px solid var(--glass-border);">
          <i data-lucide="arrow-left"></i>
          Return to Safety
        </a>
      </div>
    </div>
  </section>
  <script>
    lucide.createIcons();
  </script>
</body>
</html>
